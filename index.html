<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#081018" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Miniball" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Mini Football 4v4 Prototype</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css?v=goal-fixes-1" />
  </head>
  <body>
    <main class="game-shell">
      <canvas id="gameCanvas" aria-label="3D прототип мини-футбола 4 на 4"></canvas>

      <section class="hud" aria-label="Матч">
        <div class="scoreboard">
          <span class="team team-home">Синие</span>
          <strong id="scoreText">0 : 0</strong>
          <span class="team team-away">Красные</span>
        </div>
        <div class="match-meta">
          <span id="timerText">02:00</span>
          <span id="statusText">Матч начался</span>
        </div>
      </section>

      <section class="controls" aria-label="Управление">
        <div class="stick" id="stick" aria-hidden="true">
          <span id="stickKnob"></span>
        </div>
        <div class="action-pad">
          <button id="switchButton" type="button">Смена</button>
          <button id="kickButton" type="button">Удар</button>
        </div>
      </section>

      <aside class="help-panel" aria-label="Подсказки">
        <span>WASD / стрелки</span>
        <span>Пробел - удар</span>
        <span>Q - смена игрока</span>
      </aside>

      <button class="install-button" id="installButton" type="button">Install</button>
      <div class="install-hint" id="installHint" role="status" aria-live="polite"></div>

      <div class="rotate-prompt" aria-hidden="true">
        <div>
          <strong>Поверни телефон</strong>
          <span>Игра рассчитана на горизонтальный экран</span>
        </div>
      </div>
    </main>

    <script type="module" src="app.js?v=goal-fixes-1"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
